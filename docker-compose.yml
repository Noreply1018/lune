services:
  lune:
    build: .
    container_name: lune
    restart: unless-stopped
    ports:
      - "7788:7788"
    environment:
      LUNE_PORT: "7788"
      LUNE_DATA_DIR: "/app/data"
      LUNE_ADMIN_TOKEN: "${LUNE_ADMIN_TOKEN:-}"
    volumes:
      - lune-data:/app/data

volumes:
  lune-data:
