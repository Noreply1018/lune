services:
  lune:
    build: .
    container_name: lune
    restart: unless-stopped
    ports:
      - "7788:7788"
    environment:
      LUNE_PORT: "7788"
      LUNE_DATA_DIR: "/app/data"
      LUNE_ADMIN_TOKEN: "${LUNE_ADMIN_TOKEN:-}"
      LUNE_CPA_AUTH_DIR: "/app/cpa-auth"
    volumes:
      - lune-data:/app/data
      - cpa-auth:/app/cpa-auth

volumes:
  lune-data:
  cpa-auth:
