root = "."
tmp_dir = "tmp"

[build]
  bin = "./tmp/lune"
  cmd = "go build -o ./tmp/lune ./cmd/lune"
  args_bin = ["up"]
  delay = 500
  exclude_dir = ["tmp", "data", "cpa-auth", "web", "internal/site/dist", "vendor", ".git", ".claude"]
  exclude_regex = ["_test\\.go$"]
  include_ext = ["go", "yaml"]
  include_file = ["lune.yaml"]
  kill_delay = "1s"
  send_interrupt = true
  stop_on_error = true

[log]
  time = false

[misc]
  clean_on_exit = true
