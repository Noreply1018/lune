services:
  lune:
    image: ${LUNE_IMAGE:-ghcr.io/noreply1018/lune}:${LUNE_IMAGE_TAG:-latest}
    container_name: lune
    restart: unless-stopped
    ports:
      - "127.0.0.1:${LUNE_PORT:-7788}:${LUNE_PORT:-7788}"
    environment:
      LUNE_PORT: "${LUNE_PORT:-7788}"
      LUNE_DATA_DIR: "/app/data"
      LUNE_ADMIN_TOKEN: "${LUNE_ADMIN_TOKEN:-}"
      LUNE_CPA_AUTH_DIR: "/app/cpa-auth"
      LUNE_CPA_BASE_URL: "http://cpa:8317"
      LUNE_CPA_API_KEY: "${CPA_API_KEY:-sk-cpa-default}"
      LUNE_CPA_MANAGEMENT_KEY: "${LUNE_CPA_MANAGEMENT_KEY:-lune-cpa-management-dev}"
    volumes:
      - lune-data:/app/data
      - cpa-auth:/app/cpa-auth
    depends_on:
      - cpa

  cpa:
    image: eceasy/cli-proxy-api:latest
    container_name: lune-cpa
    restart: unless-stopped
    ports:
      - "127.0.0.1:8317:8317"
    environment:
      CPA_API_KEY: "${CPA_API_KEY:-sk-cpa-default}"
    volumes:
      - ./cpa-config.yaml:/CLIProxyAPI/config.yaml:ro
      - cpa-auth:/app/cpa-auth

volumes:
  lune-data:
  cpa-auth:
