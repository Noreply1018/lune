# Proxy node config — managed by Lune deployment
host: ""
port: 8317

# 凭据持久化目录（容器内路径，通过 volume 映射到宿主机 ./proxy-node-auth）
auth-dir: "~/.cli-proxy-api"

# 客户端鉴权密钥（后端引擎调用本节点时需携带此 key）
api-keys:
  - "sk-proxy-node-default"

# 代理通过环境变量 HTTP_PROXY/HTTPS_PROXY/ALL_PROXY 注入，此处留空
proxy-url: ""

debug: false
request-retry: 3
